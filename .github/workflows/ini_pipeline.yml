name: Initial pipeline

on:
  push:
    branches:
      - main

jobs:
  initial_setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Run linting
        run: npm run lint
      - name: Run test backend
        run: npm run test
  client_setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./phonebook
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies client
        run: npm ci
      - name: Run linting client
        run: npm run lint
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run test client
        run: npm run test
      - name: Build client
        run: npm run build
